<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="tool.css" />
</head>
<body>
  <header class="site-header">
    <div class="shell header-row">
      <a class="brand" href="index.html">CalcSuite</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="simple.html">Simple</a>
        <a href="scientific.html">Scientific</a>
        <a href="graphing.html">Graphing</a>
        <a href="financial.html">Financial</a>
        <a href="programmable.html">Programmable</a>
      </nav>
      <button class="theme-toggle" data-theme-toggle type="button">Dark</button>
    </div>
  </header>

  <main class="page">
    <div class="topbar">
      <h1>Financial Calculator</h1>
      <a href="index.html">Back to Hub</a>
    </div>

    <div class="row">
      <section class="panel">
        <h2>Simple Interest</h2>
        <p class="subtitle">SI = (P x R x T) / 100</p>
        <input class="field" id="si-principal" type="number" placeholder="Principal" />
        <input class="field" id="si-rate" type="number" placeholder="Annual rate (%)" style="margin-top:0.5rem;" />
        <input class="field" id="si-time" type="number" placeholder="Time (years)" style="margin-top:0.5rem;" />
        <button class="btn" id="si-calc" type="button" style="margin-top:0.6rem;">Calculate SI</button>
        <div class="output" id="si-output">Result: -</div>
      </section>

      <section class="panel">
        <h2>Compound Amount</h2>
        <p class="subtitle">A = P x (1 + R/(100n))^(nT)</p>
        <input class="field" id="ci-principal" type="number" placeholder="Principal" />
        <input class="field" id="ci-rate" type="number" placeholder="Annual rate (%)" style="margin-top:0.5rem;" />
        <input class="field" id="ci-time" type="number" placeholder="Time (years)" style="margin-top:0.5rem;" />
        <input class="field" id="ci-frequency" type="number" placeholder="Compounds per year (n)" value="1" style="margin-top:0.5rem;" />
        <button class="btn" id="ci-calc" type="button" style="margin-top:0.6rem;">Calculate Amount</button>
        <div class="output" id="ci-output">Result: -</div>
      </section>
    </div>

    <section class="panel" style="margin-top:0.9rem;">
      <h2>Loan EMI</h2>
      <p class="subtitle">EMI = P x r x (1+r)^n / ((1+r)^n - 1)</p>
      <div class="row">
        <input class="field" id="emi-principal" type="number" placeholder="Loan amount" />
        <input class="field" id="emi-rate" type="number" placeholder="Annual rate (%)" />
      </div>
      <div class="row" style="margin-top:0.6rem;">
        <input class="field" id="emi-years" type="number" placeholder="Tenure (years)" />
        <button class="btn" id="emi-calc" type="button">Calculate EMI</button>
      </div>
      <div class="output" id="emi-output">Result: -</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-row">
      <span>CalcSuite</span>
      <span>Financial calculator</span>
    </div>
  </footer>

  <script src="theme.js"></script>
  <script src="financial.js"></script>
</body>
</html>
